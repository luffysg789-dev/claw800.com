<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>高低期权</title>
    <meta name="description" content="Detrade 高低期权与预测产品入口。" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/predict-master/style.css?v=20260614-12" />
  </head>
  <body>
    <main class="predict-master-app">
      <header class="predict-master-header">
        <div class="predict-master-actions">
          <div class="predict-master-wallet" aria-label="交易账户余额">
            <span>余额</span>
            <strong><b id="predictMasterWalletBalance">0.00</b> USDT</strong>
          </div>
          <button id="predictMasterRechargeBtn" type="button">充值</button>
          <button id="predictMasterReloadBtn" type="button">刷新</button>
        </div>
      </header>

      <section id="predictMasterError" class="predict-master-error hidden">
        <h2>暂时无法进入</h2>
        <p id="predictMasterErrorText"></p>
      </section>

      <section id="predictMasterSdkShell" class="predict-master-sdk-shell">
        <div id="predictMasterLoading" class="predict-master-loading">加载中...</div>
        <div id="predictMasterSdkApp" class="predict-master-sdk-app"></div>
      </section>

      <div id="predictMasterRechargeModal" class="predict-master-modal" hidden>
        <div class="predict-master-modal__backdrop" data-recharge-close="true"></div>
        <section class="predict-master-modal__sheet" role="dialog" aria-modal="true" aria-labelledby="predictMasterRechargeTitle">
          <div class="predict-master-modal__head">
            <strong id="predictMasterRechargeTitle">充值交易余额</strong>
            <button id="predictMasterRechargeCancelBtn" type="button" aria-label="关闭">取消</button>
          </div>
          <label class="predict-master-amount-field" for="predictMasterRechargeAmount">
            <span>USDT 金额</span>
            <input
              id="predictMasterRechargeAmount"
              type="text"
              inputmode="decimal"
              enterkeyhint="done"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              pattern="[0-9]*[.,]?[0-9]*"
              placeholder="请输入充值金额"
              value="20"
            />
          </label>
          <button id="predictMasterRechargeConfirmBtn" class="predict-master-modal__confirm" type="button">确认充值</button>
        </section>
      </div>
    </main>
    <script src="/predict-master/script.js?v=20260614-12"></script>
  </body>
</html>
