<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Claw800 Nchat</title>
    <link rel="stylesheet" href="/nchat/style.css?v=20260418-01" />
  </head>
  <body>
    <main class="nchat-app" data-nchat-app>
      <section id="nchatGuard" class="nchat-guard" hidden>
        <div class="nchat-guard__card">
          <h1>Nchat</h1>
          <p>请在 Nexa App 内打开 Nchat</p>
        </div>
      </section>

      <section class="nchat-shell">
        <section id="nchatChatPanel" class="nchat-panel">
          <div class="nchat-search">
            <input id="nchatSearchInput" type="search" placeholder="搜索昵称或聊天号" />
          </div>

          <div id="nchatSearchResults" class="nchat-search-results" hidden></div>
          <div id="nchatConversationList" class="nchat-conversation-list"></div>
        </section>

        <section id="nchatMePanel" class="nchat-panel" hidden>
          <article class="nchat-profile-card">
            <img id="nchatMyAvatar" class="nchat-profile-card__avatar" alt="avatar" />
            <div class="nchat-profile-card__body">
              <h2 id="nchatMyNickname">Nchat 用户</h2>
              <p>聊天号 <strong id="nchatMyChatId">00000000</strong></p>
            </div>
            <div class="nchat-profile-card__actions">
              <button id="nchatProfileEditButton" class="nchat-secondary-button" type="button">编辑</button>
            </div>
          </article>
        </section>
      </section>

      <section id="nchatConversationView" class="nchat-conversation" hidden>
        <header class="nchat-conversation__header">
          <button id="nchatConversationBack" class="nchat-icon-button" type="button">‹</button>
          <div class="nchat-conversation__meta">
            <strong id="nchatConversationTitle">聊天</strong>
            <span id="nchatConversationSubtitle">00000000</span>
          </div>
        </header>
        <div id="nchatMessageList" class="nchat-message-list"></div>
        <footer class="nchat-composer">
          <input id="nchatComposerInput" type="text" placeholder="输入消息" />
          <button id="nchatComposerSend" type="button">发送</button>
        </footer>
      </section>

      <nav class="nchat-nav">
        <button class="nchat-nav__item is-active" type="button" data-tab-target="chat">聊天</button>
        <button class="nchat-nav__item" type="button" data-tab-target="me">我的</button>
      </nav>

      <div id="nchatProfileSetupModal" class="nchat-modal" hidden>
        <div class="nchat-modal__backdrop"></div>
        <div class="nchat-modal__dialog">
          <h2>完善资料</h2>
          <div class="nchat-profile-preview">
            <img id="nchatProfileAvatarPreview" class="nchat-profile-preview__avatar" alt="avatar preview" />
            <div class="nchat-profile-preview__meta">
              <strong>设置头像和昵称</strong>
              <span>保存后就能开始聊天</span>
            </div>
          </div>
          <label class="nchat-field">
            <span>头像</span>
            <input id="nchatProfileAvatarInput" type="file" accept="image/*" />
          </label>
          <label class="nchat-field">
            <span>昵称</span>
            <input id="nchatProfileNicknameInput" type="text" placeholder="填写昵称" />
          </label>
          <div id="nchatProfileFeedback" class="nchat-profile-feedback" hidden></div>
          <div class="nchat-modal__actions">
            <button id="nchatProfileClose" class="nchat-modal__close" type="button" hidden>关闭</button>
            <button id="nchatProfileSave" class="nchat-primary-button" type="button">保存进入</button>
          </div>
        </div>
      </div>
    </main>

    <script src="/nchat/script.js?v=20260418-01"></script>
  </body>
</html>
