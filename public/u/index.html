<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>U 卡申请</title>
    <meta name="description" content="Nexa 登录后申请 U 卡，查看所有卡和我的卡。" />
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        --bg: #f5f7f5;
        --surface: #ffffff;
        --ink: #17241b;
        --muted: #637267;
        --line: #dfe7e0;
        --brand: #1f7a4d;
        --brand-soft: #e6f4ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .u-apply-app {
        width: min(430px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px 14px 28px;
      }

      .u-apply-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: #214b31;
        text-decoration: none;
      }

      .back-link svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .u-apply-title {
        flex: 1;
        min-width: 0;
      }

      .u-apply-title h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0;
      }

      .u-apply-title p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .login-button,
      .primary-button,
      .secondary-button {
        min-height: 36px;
        border: 0;
        border-radius: 8px;
        background: var(--brand);
        color: #fff;
        font: inherit;
        font-size: 13px;
        font-weight: 800;
        padding: 0 12px;
      }

      .login-button:disabled,
      .primary-button:disabled,
      .secondary-button:disabled {
        opacity: 0.66;
      }

      .secondary-button {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
      }

      .session-status {
        margin: -4px 0 14px 48px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .session-status.success {
        color: #16633d;
      }

      .session-status.error {
        color: #a33434;
      }

      .tab-bar {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 14px;
      }

      .tab-button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--muted);
        font: inherit;
        font-weight: 900;
      }

      .tab-button.active {
        border-color: #9bd0ab;
        background: var(--brand-soft);
        color: #14552f;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 14px;
      }

      .card-list {
        display: grid;
        gap: 10px;
      }

      .u-card-product {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfb;
        padding: 14px;
      }

      .u-card-product h2 {
        margin: 0 0 8px;
        font-size: 17px;
      }

      .u-card-product__meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 0 0 12px;
      }

      .u-card-product__meta span {
        border: 1px solid #d7e8dc;
        border-radius: 999px;
        background: #eef8f2;
        color: #23563a;
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
        padding: 6px 8px;
      }

      .u-card-product p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .empty-state {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .list-status {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .list-status.error {
        color: #a33434;
      }

      .cardholder-modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        align-items: end;
        background: rgb(16 28 21 / 0.45);
      }

      .cardholder-dialog {
        width: min(430px, 100%);
        max-height: 92vh;
        margin: 0 auto;
        border-radius: 8px 8px 0 0;
        background: var(--surface);
        overflow: auto;
      }

      .action-dialog {
        padding-bottom: 0;
      }

      .cardholder-header {
        position: sticky;
        top: 0;
        z-index: 1;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
        padding: 16px 14px 12px;
      }

      .cardholder-header h2 {
        margin: 0;
        font-size: 20px;
      }

      .cardholder-form {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .form-row {
        display: grid;
        gap: 6px;
      }

      .form-row label,
      .form-label {
        color: #273a2d;
        font-size: 13px;
        font-weight: 800;
      }

      .required {
        color: #d64545;
      }

      .form-row input,
      .form-row select {
        width: 100%;
        min-height: 42px;
        border: 1px solid #d7e3da;
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 16px;
        padding: 0 12px;
      }

      .phone-fields {
        display: grid;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 8px;
      }

      .form-section-title {
        margin: 6px 0 0;
        font-size: 18px;
      }

      .form-note {
        margin: 0;
        color: #718175;
        font-size: 12px;
        line-height: 1.5;
      }

      .modal-actions {
        position: sticky;
        bottom: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        border-top: 1px solid var(--line);
        background: var(--surface);
        padding: 12px 14px;
      }

      .modal-actions.single {
        grid-template-columns: 1fr;
      }

      .action-modal-body {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .secure-card-preview {
        display: grid;
        gap: 18px;
        min-height: 178px;
        border-radius: 8px;
        background: linear-gradient(135deg, #1f7a4d, #2cb7a1);
        color: #fff;
        padding: 18px;
        box-shadow: 0 14px 30px rgb(31 122 77 / 0.18);
      }

      .secure-card-preview__brand {
        font-size: 14px;
        font-weight: 900;
        opacity: 0.9;
      }

      .secure-card-preview__number {
        overflow-wrap: anywhere;
        font-size: 22px;
        font-weight: 900;
        line-height: 1.25;
      }

      .secure-card-preview__meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .secure-card-preview__meta span {
        display: block;
        font-size: 11px;
        opacity: 0.78;
      }

      .secure-card-preview__meta strong {
        display: block;
        margin-top: 3px;
        font-size: 15px;
      }

      .card-info-grid {
        display: grid;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfb;
        padding: 12px;
      }

      .card-info-row {
        display: grid;
        grid-template-columns: 76px minmax(0, 1fr);
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .card-info-row strong {
        color: var(--ink);
        overflow-wrap: anywhere;
      }

      .recharge-panel {
        display: grid;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfb;
        padding: 12px;
      }

      .recharge-amount-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 82px;
        gap: 8px;
      }

      .recharge-amount-row input,
      .recharge-amount-row select {
        width: 100%;
        min-height: 44px;
        border: 1px solid #d7e3da;
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 16px;
        padding: 0 12px;
      }

      .ledger-list {
        display: grid;
        gap: 10px;
      }

      .ledger-item {
        display: grid;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfb;
        padding: 12px;
      }

      .ledger-item__head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .ledger-item__type {
        color: var(--ink);
        font-size: 14px;
        font-weight: 900;
      }

      .ledger-item__amount {
        color: #16633d;
        font-size: 14px;
        font-weight: 900;
        text-align: right;
        word-break: break-word;
      }

      .ledger-item__grid {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr);
        gap: 6px 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .ledger-item__grid strong {
        color: var(--ink);
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .my-card-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfb;
        padding: 14px;
      }

      .my-card-item h2 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .my-card-item p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .my-card-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .my-card-actions button {
        min-height: 36px;
        border-radius: 8px;
        padding: 0 12px;
        font-size: 13px;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="u-apply-app">
      <header class="u-apply-header">
        <a class="back-link" href="/games.html" aria-label="返回游戏与工具" title="返回游戏与工具">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </a>
        <div class="u-apply-title">
          <h1>U 卡申请</h1>
          <p>Nexa 登录后申请和查看你的 U 卡</p>
        </div>
        <button id="uCardLoginBtn" class="login-button" type="button">Nexa 登录</button>
      </header>

      <p id="uCardSessionStatus" class="session-status" aria-live="polite"></p>

      <nav class="tab-bar" aria-label="U 卡申请视图">
        <button class="tab-button active" type="button" data-tab="all">所有卡</button>
        <button class="tab-button" type="button" data-tab="mine">我的卡</button>
      </nav>

      <section class="panel" data-panel="all">
        <p id="uCardAllStatus" class="list-status">正在加载 U 卡产品...</p>
        <div id="uCardAllList" class="card-list"></div>
      </section>

      <section class="panel hidden" data-panel="mine">
        <p id="uCardMineStatus" class="empty-state">申请成功后，卡会显示在这里。</p>
        <div id="uCardMineList" class="card-list"></div>
      </section>
    </main>

    <div id="uCardHolderModal" class="cardholder-modal hidden" role="dialog" aria-modal="true" aria-labelledby="uCardHolderTitle">
      <div class="cardholder-dialog">
        <div class="cardholder-header">
          <h2 id="uCardHolderTitle">用卡人详情</h2>
          <p id="uCardHolderProduct" class="form-note"></p>
        </div>
        <form id="uCardHolderForm" class="cardholder-form">
          <div class="form-row">
            <label for="holderFirstName"><span class="required">*</span> 名字</label>
            <input id="holderFirstName" name="firstName" placeholder="名字" required autocomplete="given-name" />
          </div>
          <div class="form-row">
            <label for="holderLastName"><span class="required">*</span> 姓氏</label>
            <input id="holderLastName" name="lastName" placeholder="姓氏" required autocomplete="family-name" />
          </div>
          <div class="form-row">
            <label for="holderNationality"><span class="required">*</span> 国籍</label>
            <select id="holderNationality" name="nationality" required>
              <option value="">请选择国籍</option>
              <option value="中国">中国</option>
              <option value="香港">香港</option>
              <option value="日本">日本</option>
              <option value="新加坡">新加坡</option>
              <option value="美国">美国</option>
              <option value="澳大利亚">澳大利亚</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-row">
            <label for="holderBirthday"><span class="required">*</span> 生日</label>
            <input id="holderBirthday" name="birthday" type="date" required />
            <p class="form-note required">注：生日必须大于 18</p>
          </div>
          <div class="form-row">
            <span class="form-label"><span class="required">*</span> 手机号</span>
            <div class="phone-fields">
              <select id="holderPhoneCode" name="phoneCode" required aria-label="区号">
                <option value="+1">+1</option>
                <option value="+61">+61</option>
                <option value="+65">+65</option>
                <option value="+81">+81</option>
                <option value="+86" selected>+86</option>
                <option value="+852">+852</option>
              </select>
              <input name="phone" placeholder="手机号" required inputmode="tel" autocomplete="tel" />
            </div>
          </div>
          <div class="form-row">
            <label for="holderEmail"><span class="required">*</span> 邮箱</label>
            <input id="holderEmail" name="email" type="email" placeholder="邮箱" required autocomplete="email" />
          </div>
          <h3 class="form-section-title">账单地址</h3>
          <p class="form-note">银联卡可申请地区范围包括：亚美尼亚、澳洲、中国、香港、日本</p>
          <div class="form-row">
            <label for="holderCountry"><span class="required">*</span> 国家/地区</label>
            <select id="holderCountry" name="country" required>
              <option value="">国家/地区</option>
              <option value="中国">中国</option>
              <option value="香港">香港</option>
              <option value="日本">日本</option>
              <option value="澳大利亚">澳大利亚</option>
              <option value="亚美尼亚">亚美尼亚</option>
            </select>
          </div>
          <div class="form-row">
            <label for="holderState"><span class="required">*</span> 省份/州</label>
            <input id="holderState" name="state" placeholder="省份/州" required autocomplete="address-level1" />
          </div>
          <div class="form-row">
            <label for="holderCity"><span class="required">*</span> 城市</label>
            <input id="holderCity" name="city" placeholder="城市" required autocomplete="address-level2" />
          </div>
          <div class="form-row">
            <label for="holderPostalCode"><span class="required">*</span> 邮政编码</label>
            <input id="holderPostalCode" name="postalCode" placeholder="邮政编码" required autocomplete="postal-code" />
          </div>
          <div class="form-row">
            <label for="holderAddress"><span class="required">*</span> 详细地址</label>
            <input id="holderAddress" name="address" placeholder="详细地址" required autocomplete="street-address" />
          </div>
          <h3 class="form-section-title">安全问题 <span class="form-note">申请银联卡时必填</span></h3>
          <div class="form-row">
            <label for="holderSecurityQuestion">安全问题</label>
            <input id="holderSecurityQuestion" name="securityQuestion" placeholder="安全问题" />
          </div>
          <div class="form-row">
            <label for="holderSecurityAnswer">安全答案</label>
            <input id="holderSecurityAnswer" name="securityAnswer" placeholder="安全答案" />
          </div>
          <p id="uCardHolderMessage" class="list-status" aria-live="polite"></p>
          <div class="modal-actions">
            <button id="uCardHolderCancelBtn" class="secondary-button" type="button">取消</button>
            <button class="primary-button" type="submit">提交</button>
          </div>
        </form>
      </div>
    </div>

    <div id="uCardInfoModal" class="cardholder-modal hidden" role="dialog" aria-modal="true" aria-labelledby="uCardInfoTitle">
      <div class="cardholder-dialog action-dialog">
        <div class="cardholder-header">
          <h2 id="uCardInfoTitle">卡信息</h2>
          <p id="uCardInfoSubtitle" class="form-note"></p>
        </div>
        <div class="action-modal-body">
          <div class="secure-card-preview" aria-label="U 卡信息">
            <div class="secure-card-preview__brand">uPAL</div>
            <div id="uCardInfoNumberPreview" class="secure-card-preview__number">-</div>
            <div class="secure-card-preview__meta">
              <div>
                <span>有效期</span>
                <strong id="uCardInfoExpiryPreview">-</strong>
              </div>
              <div>
                <span>CVV</span>
                <strong id="uCardInfoCvvPreview">-</strong>
              </div>
            </div>
          </div>
          <div class="card-info-grid">
            <div class="card-info-row"><span>卡 ID</span><strong id="uCardInfoCardId">-</strong></div>
            <div class="card-info-row"><span>卡号</span><strong id="uCardInfoCardNo">-</strong></div>
            <div class="card-info-row"><span>有效期</span><strong id="uCardInfoExpiry">-</strong></div>
            <div class="card-info-row"><span>CVV</span><strong id="uCardInfoCvv">-</strong></div>
            <div class="card-info-row"><span>状态</span><strong id="uCardInfoStatus">-</strong></div>
            <div class="card-info-row"><span>余额</span><strong id="uCardInfoBalance">-</strong></div>
          </div>
          <p id="uCardInfoMessage" class="form-note"></p>
        </div>
        <div class="modal-actions single">
          <button id="uCardInfoCloseBtn" class="secondary-button" type="button">关闭</button>
        </div>
      </div>
    </div>

    <div id="uCardRechargeModal" class="cardholder-modal hidden" role="dialog" aria-modal="true" aria-labelledby="uCardRechargeTitle">
      <div class="cardholder-dialog action-dialog">
        <div class="cardholder-header">
          <h2 id="uCardRechargeTitle">充卡</h2>
          <p id="uCardRechargeSubtitle" class="form-note"></p>
        </div>
        <form id="uCardRechargeForm" class="action-modal-body">
          <div class="recharge-panel">
            <div class="card-info-row"><span>卡 ID</span><strong id="uCardRechargeCardId">-</strong></div>
            <div class="card-info-row"><span>卡号</span><strong id="uCardRechargeCardNo">-</strong></div>
            <div class="form-row">
              <label for="uCardRechargeAmount"><span class="required">*</span> 充值金额</label>
              <div class="recharge-amount-row">
                <input id="uCardRechargeAmount" name="amount" inputmode="decimal" placeholder="请输入金额" required />
                <select id="uCardRechargeCurrency" name="currency" aria-label="充值币种">
                  <option value="USDT">USDT</option>
                </select>
              </div>
            </div>
            <p class="form-note">提交后会向上游发起充卡请求，到账结果以资金明细为准。</p>
          </div>
          <p id="uCardRechargeMessage" class="list-status" aria-live="polite"></p>
          <div class="modal-actions">
            <button id="uCardRechargeCancelBtn" class="secondary-button" type="button">取消</button>
            <button class="primary-button" type="submit">确认充卡</button>
          </div>
        </form>
      </div>
    </div>

    <div id="uCardLedgerModal" class="cardholder-modal hidden" role="dialog" aria-modal="true" aria-labelledby="uCardLedgerTitle">
      <div class="cardholder-dialog action-dialog">
        <div class="cardholder-header">
          <h2 id="uCardLedgerTitle">资金明细</h2>
          <p id="uCardLedgerSubtitle" class="form-note"></p>
        </div>
        <div class="action-modal-body">
          <div id="uCardLedgerList" class="ledger-list"></div>
          <p id="uCardLedgerMessage" class="form-note"></p>
        </div>
        <div class="modal-actions single">
          <button id="uCardLedgerCloseBtn" class="secondary-button" type="button">关闭</button>
        </div>
      </div>
    </div>

    <script>
      const NEXA_PROTOCOL_AUTH_BASE = 'nexaauth://oauth/authorize';
      const NEXA_PROTOCOL_ORDER_BASE = 'nexaauth://order';
      const NEXA_PUBLIC_CONFIG_ENDPOINT = '/api/nexa/public-config';
      const U_CARD_PRODUCTS_ENDPOINT = '/api/u-card/products';
      const U_CARD_HOLDER_OPTIONS_ENDPOINT = '/api/u-card/holder-options';
      const U_CARD_PAYMENT_CREATE_ENDPOINT = '/api/u-card/payment/create';
      const U_CARD_PAYMENT_QUERY_ENDPOINT = '/api/nexa/tip/query';
      const U_CARD_RECHARGE_PAYMENT_CREATE_ENDPOINT = '/api/u-card/applications/:applicationNo/recharge-payment/create';
      const U_CARD_APPLICATIONS_ENDPOINT = '/api/u-card/applications';
      const U_CARD_REVIEW_POLL_INTERVAL_MS = 5 * 60 * 1000;
      const U_CARD_RECHARGE_PAYMENT_TIMEOUT_MS = 2 * 60 * 1000;
      const U_CARD_SESSION_STORAGE_KEY = 'claw800:u-card:nexa-session';
      const U_CARD_PENDING_PAYMENT_STORAGE_KEY = 'claw800:u-card:pending-payment';

      const tabButtons = document.querySelectorAll('.tab-button');
      const panels = document.querySelectorAll('[data-panel]');
      const loginButton = document.getElementById('uCardLoginBtn');
      const sessionStatus = document.getElementById('uCardSessionStatus');
      const allCardsStatus = document.getElementById('uCardAllStatus');
      const allCardsList = document.getElementById('uCardAllList');
      const mineCardsStatus = document.getElementById('uCardMineStatus');
      const mineCardsList = document.getElementById('uCardMineList');

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function isUCardApiCardId(value) {
        return /^CARD/i.test(String(value || '').replace(/[\s*]+/g, '').trim());

        return String(item?.card_id || item?.platform_card_no || '').trim();
      }

      function getUCardDisplayCardNo(item) {

        const balance = String(item?.card_balance || '').trim();

      function renderMyCards(items = currentApplications) {

      async function loadMyCards() {
        const session = readCachedNexaSession();
        if (!session?.openId) {
          renderMyCards([]);
          scheduleUCardReviewPolling();
          return;
        }
        setMineCardsStatus('正在加载我的卡...');
        try {
          const response = await fetch(`${U_CARD_APPLICATIONS_ENDPOINT}?openId=${encodeURIComponent(session.openId)}`, {
            method: 'GET',
            cache: 'no-store',
            credentials: 'same-origin',
            headers: {
              Accept: 'application/json',
              'Cache-Control': 'no-store',
              Pragma: 'no-cache'
            }
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || payload?.ok === false) throw new Error(payload?.error || '我的卡加载失败');
          renderMyCards(Array.isArray(payload.items) ? payload.items : []);
          scheduleUCardReviewPolling();
        } catch (error) {
          mineCardsList.innerHTML = '';
          setMineCardsStatus(error?.message || '我的卡加载失败', 'error');
        }
      }

      function hasReviewPendingCards() {
        return currentApplications.some((item) => String(item.status || '').trim() === 'review_pending');
      }

      function stopUCardReviewPolling() {
        if (!uCardReviewPollTimer) return;
        window.clearInterval(uCardReviewPollTimer);
        uCardReviewPollTimer = null;
      }

      function scheduleUCardReviewPolling() {
        if (!hasReviewPendingCards()) {
          stopUCardReviewPolling();
          return;
        }
        if (uCardReviewPollTimer) return;
        uCardReviewPollTimer = window.setInterval(async () => {
          if (!hasReviewPendingCards()) {
            stopUCardReviewPolling();
            return;
          }
          await loadMyCards().catch(() => {});
          if (!hasReviewPendingCards()) stopUCardReviewPolling();
        }, U_CARD_REVIEW_POLL_INTERVAL_MS);
      }

      const DEFAULT_HOLDER_PHONE_CODE = '+86';

      function normalizePhoneCountryCode(value) {
        const raw = String(value || '').trim();
        if (!raw) return '';
        const digits = raw.replace(/[^\d]/g, '');
        if (!digits) return raw;
        return `+${digits}`;
      }

      function getPhoneCountryCodeNumber(item) {
        const value = normalizePhoneCountryCode(item?.value || item);
        const digits = value.replace(/[^\d]/g, '');
        return Number(digits || Number.MAX_SAFE_INTEGER);
      }

      function sortPhoneCountryCodeOptions(items) {
        return (Array.isArray(items) ? [...items] : []).sort((left, right) => {
          const leftNumber = getPhoneCountryCodeNumber(left);
          const rightNumber = getPhoneCountryCodeNumber(right);
          if (leftNumber !== rightNumber) return leftNumber - rightNumber;
          return String(left?.label || left?.value || left).localeCompare(String(right?.label || right?.value || right));
        });
      }

      function setDefaultHolderPhoneCode() {
        const target = document.getElementById('holderPhoneCode');
        if (!target) return;
        const defaultOption = Array.from(target.options).find((option) => normalizePhoneCountryCode(option.value) === DEFAULT_HOLDER_PHONE_CODE);
        if (defaultOption) target.value = defaultOption.value;
      }

      function renderOptionList(target, items = [], fallback = []) {
        if (!target) return;
        const merged = [...items, ...fallback.map((value) => ({ value, label: value }))];
        const seen = new Set();
        const options = merged
          .map((item) => {
            const value = normalizePhoneCountryCode(item?.value || item);
            return {
              value,
              label: normalizePhoneCountryCode(item?.label || item?.value || item) || value
            };
          })
          .filter((item) => {
            const value = item.value;
            if (!value || seen.has(value)) return false;
            seen.add(value);
            return true;
          })
          .sort((left, right) => getPhoneCountryCodeNumber(left) - getPhoneCountryCodeNumber(right));
        target.innerHTML = options.map((item) => `<option value="${escapeHtml(item.value)}">${escapeHtml(item.value)}</option>`).join('');
      }

      async function getNexaPublicConfig() {
        if (cachedNexaPublicConfig?.apiKey) {
          return cachedNexaPublicConfig;
        }

        const response = await fetch(NEXA_PUBLIC_CONFIG_ENDPOINT, {
          method: 'GET',
          cache: 'no-store',
          credentials: 'same-origin',
          headers: {
            Accept: 'application/json',
            'Cache-Control': 'no-store',
            Pragma: 'no-cache'
          }
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload?.ok === false) {
          throw new Error(payload?.error || 'Nexa 登录配置不可用');
        }

        const apiKey = String(payload?.apiKey || '').trim();
        if (!apiKey) {
          throw new Error('后台未配置 Nexa API Key');
        }

        cachedNexaPublicConfig = { apiKey };
        return cachedNexaPublicConfig;
      }

      function buildCleanReturnUrl() {
        const url = new URL(window.location.href);
        ['code', 'authCode', 'auth_code', 'state'].forEach((key) => url.searchParams.delete(key));
        url.hash = '';
        return url.toString();
      }

      function extractAuthCodeFromUrl() {
        try {
          const params = new URL(window.location.href).searchParams;
          return String(params.get('code') || params.get('authCode') || params.get('auth_code') || '').trim();
        } catch (error) {
          return '';
        }
      }

      function clearAuthCodeFromUrl() {
        try {
          const url = new URL(window.location.href);
          ['code', 'authCode', 'auth_code', 'state'].forEach((key) => url.searchParams.delete(key));
          url.hash = '';
          window.history.replaceState({}, document.title, url.toString());
        } catch (error) {
          // The login flow can continue even if the browser blocks history updates.
        }
      }

      async function postJson(url, body) {
        const response = await fetch(url, {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json',
            Accept: 'application/json'
          },
          body: JSON.stringify(body || {})
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload?.ok === false) {
          throw new Error(payload?.error || payload?.message || '请求失败');
        }
        return payload;
      }

      function buildNexaPaymentUrl(payment) {
        const redirectUrl = buildCleanReturnUrl();
        const params = new URLSearchParams({
          orderNo: String(payment?.orderNo || '').trim(),
          paySign: String(payment?.paySign || '').trim(),
          signType: String(payment?.signType || 'MD5').trim(),
          apiKey: String(payment?.apiKey || cachedNexaPublicConfig?.apiKey || '').trim(),
          nonce: String(payment?.nonce || '').trim(),
          timestamp: String(payment?.timestamp || '').trim(),
          redirectUrl
        });
        return `${NEXA_PROTOCOL_ORDER_BASE}?${params.toString()}`;
      }

      function rememberNexaSession(session) {
        localStorage.setItem(
          U_CARD_SESSION_STORAGE_KEY,
          JSON.stringify({
            ...session,
            savedAt: Date.now()
          })
        );
      }

      function readCachedNexaSession() {
        try {
          const session = JSON.parse(localStorage.getItem(U_CARD_SESSION_STORAGE_KEY) || 'null');
          if (session?.openId && session?.sessionKey) {
            return session;
          }
        } catch (error) {
          localStorage.removeItem(U_CARD_SESSION_STORAGE_KEY);
        }
        return null;
      }

      function rememberPendingPayment(payment) {
        localStorage.setItem(U_CARD_PENDING_PAYMENT_STORAGE_KEY, JSON.stringify(payment));
      }

      function readPendingPayment() {
        try {
          const item = JSON.parse(localStorage.getItem(U_CARD_PENDING_PAYMENT_STORAGE_KEY) || 'null');
          if (item?.orderNo) return item;
        } catch (error) {
          localStorage.removeItem(U_CARD_PENDING_PAYMENT_STORAGE_KEY);
        }
        return null;
      }

      function clearPendingPayment() {
        localStorage.removeItem(U_CARD_PENDING_PAYMENT_STORAGE_KEY);
      }

      function showLoggedInState(session) {
        loginButton.textContent = '已登录';
        const name = String(session?.nickname || 'Nexa 用户').trim() || 'Nexa 用户';
        setSessionStatus(`${name}，可以申请 U 卡。`, 'success');
      }

      async function beginNexaLoginFlow() {
        loginButton.disabled = true;
        setSessionStatus('正在打开 Nexa 授权...');
        try {
          const config = await getNexaPublicConfig();
          const redirectUri = buildCleanReturnUrl();
          window.location.href = `${NEXA_PROTOCOL_AUTH_BASE}?apikey=${encodeURIComponent(config.apiKey)}&redirect_uri=${encodeURIComponent(redirectUri)}`;
        } catch (error) {
          loginButton.disabled = false;
          setSessionStatus(error?.message || 'Nexa 登录失败', 'error');
        }
      }

      async function syncSessionFromAuthCode() {
        const authCode = extractAuthCodeFromUrl();
        if (!authCode) {
          const session = readCachedNexaSession();
          if (session) {
            showLoggedInState(session);
          }
          return;
        }

        loginButton.disabled = true;
        setSessionStatus('正在完成 Nexa 登录...');
        try {
          const response = await fetch('/api/nexa/tip/session', {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              authCode,
              gameSlug: 'u-card'
            })
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || payload?.ok === false) {
            throw new Error(payload?.error || 'Nexa 登录失败');
          }

          const source = payload?.session || payload?.data || {};
          const session = {
            openId: String(source.openId || source.open_id || '').trim(),
            sessionKey: String(source.sessionKey || source.session_key || '').trim(),
            nickname: String(source.nickname || source.nickName || 'Nexa 用户').trim() || 'Nexa 用户',
            avatar: String(source.avatar || source.avatarUrl || '').trim()
          };
          if (!session.openId || !session.sessionKey) {
            throw new Error('Nexa 登录信息不完整');
          }

          rememberNexaSession(session);
          showLoggedInState(session);
          clearAuthCodeFromUrl();
        } catch (error) {
          clearAuthCodeFromUrl();
          setSessionStatus(error?.message || 'Nexa 登录失败', 'error');
        } finally {
          loginButton.disabled = false;
        }
      }

      async function queryPaymentStatus(orderNo) {
        const payload = await postJson(U_CARD_PAYMENT_QUERY_ENDPOINT, { orderNo });
        return String(payload.status || '').trim().toUpperCase();
      }

      async function waitForPaymentSuccess(orderNo) {
        const startedAt = Date.now();
        while (Date.now() - startedAt < 45000) {
          const status = await queryPaymentStatus(orderNo);
          if (status === 'SUCCESS') return true;
          if (status === 'FAILED' || status === 'CANCELED' || status === 'EXPIRED') return false;
          await new Promise((resolve) => window.setTimeout(resolve, 2000));
        }
        return false;
      }

      async function callUCardAction(applicationNo, action, body = {}) {
        const session = readCachedNexaSession();
        return postJson(`${U_CARD_APPLICATIONS_ENDPOINT}/${encodeURIComponent(applicationNo)}/${action}`, {
          openId: session?.openId || '',
          ...body

      function getUCardPayloadObject(payload) {
        const source = payload?.item || payload?.data || payload || {};
        return source?.data && typeof source.data === 'object' ? source.data : source;
      }

      function findUCardPayloadValue(payload, keys, depth = 0) {
        if (!payload || typeof payload !== 'object' || depth > 4) return '';
        for (const key of keys) {
          const value = payload[key];
          if (value !== undefined && value !== null && String(value).trim()) return String(value).trim();
        }
        for (const value of Object.values(payload)) {
          if (value && typeof value === 'object') {
            const nested = findUCardPayloadValue(value, keys, depth + 1);
            if (nested) return nested;
          }
        }
        return '';
      }

      function getUCardSecureCardNo(payload) {
        return findUCardPayloadValue(getUCardPayloadObject(payload), [
          'cardNo',
          'card_no',
          'cardNumber',
          'card_number',
          'pan',
          'number',
          'maskedCardNo',
          'masked_card_no',
          'cardNoMasked',
          'card_no_masked'
        ]);
      }

      function getUCardDetailCardId(payload) {
        return findUCardPayloadValue(getUCardPayloadObject(payload), ['card_id', 'cardId', 'id']);
      }

      function getUCardSecureExpiry(payload) {
        const data = getUCardPayloadObject(payload);
        const explicit = findUCardPayloadValue(data, [
          'expiry',
          'expire',
          'expireDate',
          'expire_date',
          'expirationDate',
          'expiration_date',
          'validThru',
          'valid_thru'
        ]);
        if (explicit) return explicit;
        const month = findUCardPayloadValue(data, ['expMonth', 'exp_month', 'expiryMonth', 'expiry_month']);
        const year = findUCardPayloadValue(data, ['expYear', 'exp_year', 'expiryYear', 'expiry_year']);
        return month && year ? `${month}/${year}` : '';
      }

      function getUCardSecureCvv(payload) {
        return findUCardPayloadValue(getUCardPayloadObject(payload), ['cvv', 'cvv2', 'cvc', 'securityCode', 'security_code']);
      }

      function getUCardDetailStatus(payload) {
        return findUCardPayloadValue(getUCardPayloadObject(payload), ['status', 'cardStatus', 'card_status']);
      }

      function getUCardDetailBalance(payload) {
        const data = getUCardPayloadObject(payload);
        const balance = findUCardPayloadValue(data, ['balance', 'availableBalance', 'available_balance', 'availableAmount', 'available_amount']);
        const currency = findUCardPayloadValue(data, ['currency', 'cardCurrency', 'card_currency']);
        return balance && currency ? `${balance} ${currency}` : balance;
      }

      function getUCardLedgerItems(payload) {
        const data = getUCardPayloadObject(payload);
        const candidates = [
          data.items,
          data.records,
          data.list,
          data.transactions,
          data.logs,
          data.data,
          payload?.item?.items,
          payload?.item?.data?.items
        ];
        return candidates.find((item) => Array.isArray(item)) || [];
      }

      function getUCardLedgerValue(item, keys) {
        return keys.map((key) => String(item?.[key] || '').trim()).find(Boolean) || '';
      }

      function formatUCardLedgerAmount(item) {
        const amount = getUCardLedgerValue(item, ['amount', 'changeAmount', 'change_amount', 'balanceChange', 'balance_change', 'money']);
        const currency = getUCardLedgerValue(item, ['currency', 'cardCurrency', 'card_currency']);
        return amount && currency ? `${amount} ${currency}` : amount || '-';
      }

      function renderUCardLedgerItems(items) {
        if (!items.length) {
          ledgerList.innerHTML = '';
          setText('uCardLedgerMessage', '暂无资金明细。');
          return;
        }
        setText('uCardLedgerMessage', '');
        ledgerList.innerHTML = items
          .map((item) => {
            const time = getUCardLedgerValue(item, ['createdAt', 'created_at', 'time', 'createdTime', 'created_time', 'transactionTime', 'transaction_time']);
            const type = getUCardLedgerValue(item, ['type', 'transactionType', 'transaction_type', 'bizType', 'biz_type', 'remark']) || '资金变动';
            const amount = formatUCardLedgerAmount(item);
            const balance = getUCardLedgerValue(item, ['balance', 'balanceAfter', 'balance_after', 'afterBalance', 'after_balance', 'availableBalance', 'available_balance']);
            const status = getUCardLedgerValue(item, ['status', 'state', 'result']) || '-';
            return `
              <article class="ledger-item">
                <div class="ledger-item__head">
                  <strong class="ledger-item__type">${escapeHtml(type)}</strong>
                  <strong class="ledger-item__amount">${escapeHtml(amount)}</strong>
                </div>
                <div class="ledger-item__grid">
                  <span>时间</span><strong>${escapeHtml(time || '-')}</strong>
                  <span>类型</span><strong>${escapeHtml(type)}</strong>
                  <span>金额</span><strong>${escapeHtml(amount)}</strong>
                  <span>余额</span><strong>${escapeHtml(balance || '-')}</strong>
                  <span>状态</span><strong>${escapeHtml(status)}</strong>
                </div>
              </article>
            `;
          })
          .join('');
      }

      function setText(id, value) {
        const target = document.getElementById(id);
        if (target) target.textContent = String(value || '-');
      }

      function openUCardInfoModal(application, payload) {
        const cardId = getUCardDetailCardId(payload) || getUCardDisplayCardId(application);
        const cardNo = getUCardSecureCardNo(payload) || getUCardDisplayCardNo(application);
        const expiry = getUCardSecureExpiry(payload);
        const cvv = getUCardSecureCvv(payload);
        const status = getUCardDetailStatus(payload);
        const balance = getUCardDetailBalance(payload);
        setText('uCardInfoSubtitle', application?.product_name || 'U 卡');
        setText('uCardInfoNumberPreview', cardNo);
        setText('uCardInfoExpiryPreview', expiry);
        setText('uCardInfoCvvPreview', cvv);
        setText('uCardInfoCardId', cardId);
        setText('uCardInfoCardNo', cardNo);
        setText('uCardInfoExpiry', expiry);
        setText('uCardInfoCvv', cvv);
        setText('uCardInfoStatus', status);
        setText('uCardInfoBalance', balance);
        setText('uCardInfoMessage', cardNo ? '卡信息来自上游接口，请妥善保管。' : '上游暂未返回完整卡号，请稍后再试。');
        infoModal.classList.remove('hidden');
      }

      function closeUCardInfoModal() {
        infoModal.classList.add('hidden');
      }

      function openUCardRechargeModal(application) {
        activeRechargeApplication = application;
        rechargeForm.reset();
        setText('uCardRechargeSubtitle', application?.product_name || 'U 卡');
        setText('uCardRechargeCardId', getUCardDisplayCardId(application));
        setText('uCardRechargeCardNo', getUCardDisplayCardNo(application));
        const message = document.getElementById('uCardRechargeMessage');
        message.textContent = '';
        message.classList.remove('error');
        rechargeModal.classList.remove('hidden');
        document.getElementById('uCardRechargeAmount').focus();
      }

      function closeUCardRechargeModal() {
        rechargeModal.classList.add('hidden');
        activeRechargeApplication = null;
      }

      function openUCardLedgerModal(application, payload) {
        setText('uCardLedgerSubtitle', application?.product_name || 'U 卡');
        renderUCardLedgerItems(getUCardLedgerItems(payload));
        ledgerModal.classList.remove('hidden');
      }

      function closeUCardLedgerModal() {
        ledgerModal.classList.add('hidden');
      }

      function openCardholderForm(application) {
        activePaidApplication = application;
        holderForm.reset();
        setDefaultHolderPhoneCode();
        holderMessage.textContent = '';
        holderMessage.classList.remove('error');
        holderProduct.textContent = `${application.product_name || application.product?.name || 'U 卡产品'} · 已支付 ${application.amount || ''} ${application.currency || 'USDT'}`;
        holderModal.classList.remove('hidden');
        loadUCardHolderOptions();
        document.getElementById('holderFirstName').focus();
      }

      function closeCardholderForm() {
        holderModal.classList.add('hidden');
        activePaidApplication = null;
      }

      async function settlePendingPayment() {
        const pending = readPendingPayment();
        if (!pending?.orderNo) return;
        if (pending.type === 'recharge' && Number(pending.expiresAt || 0) <= Date.now()) {
          clearPendingPayment();
          flashSessionStatus('充卡支付超时，订单已取消。', 'error');
          return;
        }
        setSessionStatus('正在确认 U 卡支付结果...');
        try {
          const status = await queryPaymentStatus(pending.orderNo);
          if (status === 'SUCCESS') {
            if (pending.type === 'recharge' && pending.applicationNo) {
              await callUCardAction(pending.applicationNo, 'recharge', {
                amount: pending.amount,
                paymentOrderNo: pending.orderNo
              });
            } else if (pending.applicationNo) {
              await confirmUCardApplicationPayment(pending.applicationNo);
            } else {
              await recoverPaidUCardApplication(pending);
            }
            clearPendingPayment();
            await loadMyCards();
            selectTab('mine');
            setSessionStatus(pending.type === 'recharge' ? '支付成功，充卡请求已提交，上游处理中。' : '支付成功，已放入我的卡。点开后可补充用卡人资料。', 'success');
          } else if (status === 'FAILED' || status === 'CANCELED' || status === 'EXPIRED') {
            clearPendingPayment();
            setSessionStatus('支付未完成，请重新申请。', 'error');
          }
        } catch (error) {
          setSessionStatus(error?.message || '支付结果确认失败', 'error');
        }
      }

      async function beginUCardRechargePayment(application, amount) {
        const session = readCachedNexaSession();
        if (!session) {
          beginNexaLoginFlow();
          return;
        }
        const applicationNo = String(application?.application_no || '').trim();
        if (!applicationNo) {
          throw new Error('未找到 U 卡申请单');
        }
        const endpoint = U_CARD_RECHARGE_PAYMENT_CREATE_ENDPOINT.replace(':applicationNo', encodeURIComponent(applicationNo));
        const response = await postJson(endpoint, {
          openId: session.openId,
          sessionKey: session.sessionKey,
          amount
        });
        const pending = {
          type: 'recharge',
          orderNo: response.orderNo,
          applicationNo,
          amount: response.amount || amount,
          currency: response.currency || 'USDT',
          createdAt: Date.now(),
          expiresAt: Date.now() + U_CARD_RECHARGE_PAYMENT_TIMEOUT_MS
        };
        rememberPendingPayment(pending);
        setSessionStatus('请在 Nexa 中完成充卡支付，支付成功后会自动提交上游充卡。');
        window.location.href = buildNexaPaymentUrl(response.payment);
        const paid = await waitForPaymentSuccess(response.orderNo);
        if (paid) {
          await callUCardAction(application.application_no, 'recharge', { amount, paymentOrderNo: response.orderNo });
          clearPendingPayment();
          await loadMyCards();
          selectTab('mine');
          setSessionStatus('支付成功，充卡请求已提交，上游处理中。', 'success');
        } else if (Number(pending.expiresAt || 0) <= Date.now()) {
          clearPendingPayment();
          flashSessionStatus('充卡支付超时，订单已取消。', 'error');
        }
      }

      async function beginUCardPayment(productCode, button) {
        const session = readCachedNexaSession();
        if (!session) {
          beginNexaLoginFlow();
          return;
        }
        const product = findProduct(productCode);
        if (!product) {
          setSessionStatus('请选择有效的 U 卡产品。', 'error');
          return;
        }
        button.disabled = true;
        setSessionStatus('正在创建 U 卡支付订单...');
        try {
          const response = await postJson(U_CARD_PAYMENT_CREATE_ENDPOINT, {
            productCode,
            openId: session.openId,
            sessionKey: session.sessionKey
          });
          const pending = {
            orderNo: response.orderNo,
            applicationNo: response.application?.application_no || '',
            productCode,
            amount: response.amount,
            currency: response.currency,
            product: response.product || product,
            product_name: response.application?.product_name || response.product?.name || product.name || 'U 卡产品',
            createdAt: Date.now()
          };
          rememberPendingPayment(pending);
          setSessionStatus('请在 Nexa 中完成支付，支付成功后会先放入我的卡。');
          window.location.href = buildNexaPaymentUrl(response.payment);
          const paid = await waitForPaymentSuccess(response.orderNo);
          if (paid) {
            if (pending.applicationNo) {
              await confirmUCardApplicationPayment(pending.applicationNo);
            } else {
              await recoverPaidUCardApplication(pending);
            }
            clearPendingPayment();
            await loadMyCards();
            selectTab('mine');
            setSessionStatus('支付成功，已放入我的卡。点开后可补充用卡人资料。', 'success');
          }
        } catch (error) {
          setSessionStatus(error?.message || 'U 卡支付下单失败', 'error');
        } finally {
          button.disabled = false;
        }
      }

      loginButton.addEventListener('click', beginNexaLoginFlow);
      allCardsList.addEventListener('click', (event) => {
        const button = event.target.closest('[data-apply-product]');
        if (!button) return;
        beginUCardPayment(String(button.dataset.applyProduct || '').trim(), button);
      });
      mineCardsList.addEventListener('click', async (event) => {
        const fillButton = event.target.closest('[data-fill-profile]');
        const checkButton = event.target.closest('[data-check-review]');
        const secureButton = event.target.closest('[data-view-secure]');
        const rechargeButton = event.target.closest('[data-recharge-card]');
        const ledgerButton = event.target.closest('[data-view-ledger]');
        try {
          if (fillButton) {
            const item = findApplication(fillButton.dataset.fillProfile);
            if (item) openCardholderForm(item);
            return;
          }
          if (checkButton) {
            checkButton.disabled = true;
            const item = await checkUCardReview(checkButton.dataset.checkReview);
            if (item) await loadMyCards();
            setSessionStatus(item?.status === 'approved' ? '审核已通过，卡功能已开放。' : '仍在审核中，请稍后再查。', item?.status === 'approved' ? 'success' : '');
            return;
          }
          if (secureButton) {
            secureButton.disabled = true;
            const item = findApplication(secureButton.dataset.viewSecure);
            const payload = await callUCardAction(secureButton.dataset.viewSecure, 'secure-info');
            openUCardInfoModal(item || {}, payload);
            return;
          }
          if (rechargeButton) {
            const item = findApplication(rechargeButton.dataset.rechargeCard);
            if (item) openUCardRechargeModal(item);
            return;
          }
          if (ledgerButton) {
            ledgerButton.disabled = true;
            const item = findApplication(ledgerButton.dataset.viewLedger);
            const payload = await callUCardAction(ledgerButton.dataset.viewLedger, 'transactions');
            openUCardLedgerModal(item || {}, payload);
          }
        } catch (error) {
          setSessionStatus(error?.message || 'U 卡操作失败', 'error');
        } finally {
          [fillButton, checkButton, secureButton, rechargeButton, ledgerButton].forEach((button) => {
            if (button) button.disabled = false;
          });
        }
      });
      holderCancelButton.addEventListener('click', closeCardholderForm);
      infoCloseButton.addEventListener('click', closeUCardInfoModal);
      rechargeCancelButton.addEventListener('click', closeUCardRechargeModal);
      ledgerCloseButton.addEventListener('click', closeUCardLedgerModal);
      rechargeForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!activeRechargeApplication) return;
        const amount = String(new FormData(rechargeForm).get('amount') || '').trim();
        const message = document.getElementById('uCardRechargeMessage');
        if (!amount || Number(amount) <= 0) {
          message.textContent = '请输入有效的充值金额。';
          message.classList.add('error');
          return;
        }
        const submitButton = rechargeForm.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        message.textContent = '正在创建 Nexa 充卡支付订单...';
        message.classList.remove('error');
        try {
          await beginUCardRechargePayment(activeRechargeApplication, amount);
          closeUCardRechargeModal();
        } catch (error) {
          message.textContent = error?.message || '充卡失败';
          message.classList.add('error');
        } finally {
          submitButton.disabled = false;
        }
      });
      holderForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!activePaidApplication) return;
        const formData = Object.fromEntries(new FormData(holderForm).entries());
        const birthdayTime = new Date(String(formData.birthday || '')).getTime();
        const eighteenYearsAgo = new Date();
        eighteenYearsAgo.setFullYear(eighteenYearsAgo.getFullYear() - 18);
        if (!birthdayTime || birthdayTime > eighteenYearsAgo.getTime()) {
          holderMessage.textContent = '生日必须大于 18 岁。';
          holderMessage.classList.add('error');
          return;
        }
        const submitButton = holderForm.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        holderMessage.textContent = '正在提交资料并发起上游开卡...';
        holderMessage.classList.remove('error');
        try {
          await submitUCardHolderProfile(activePaidApplication.application_no, formData);
          await loadMyCards();
          closeCardholderForm();
          selectTab('mine');
          scheduleUCardReviewPolling();
          setSessionStatus('卡资料已提交，已进入审核中。系统会每 5 分钟继续查询上游结果。', 'success');
        } catch (error) {
          holderMessage.textContent = error?.message || '资料提交失败';
          holderMessage.classList.add('error');
        } finally {
          submitButton.disabled = false;
        }
      });
      loadUCardProducts();
      syncSessionFromAuthCode().then(() => loadMyCards()).then(settlePendingPayment);
    </script>
  </body>
</html>
