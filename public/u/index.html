<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>U 卡申请</title>
    <meta name="description" content="Nexa 登录后申请 U 卡，查看所有卡和我的卡。" />
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        --bg: #f5f7f5;
        --surface: #ffffff;
        --ink: #17241b;
        --muted: #637267;
        --line: #dfe7e0;
        --brand: #1f7a4d;
        --brand-soft: #e6f4ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .u-apply-app {
        width: min(430px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px 14px 28px;
      }

      .u-apply-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: #214b31;
        text-decoration: none;
      }

      .back-link svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .u-apply-title {
        flex: 1;
        min-width: 0;
      }

      .u-apply-title h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0;
      }

      .u-apply-title p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .login-button,
      .primary-button {
        min-height: 36px;
        border: 0;
        border-radius: 8px;
        background: var(--brand);
        color: #fff;
        font: inherit;
        font-size: 13px;
        font-weight: 800;
        padding: 0 12px;
      }

      .tab-bar {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 14px;
      }

      .tab-button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--muted);
        font: inherit;
        font-weight: 900;
      }

      .tab-button.active {
        border-color: #9bd0ab;
        background: var(--brand-soft);
        color: #14552f;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 14px;
      }

      .card-list {
        display: grid;
        gap: 10px;
      }

      .u-card-product {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfb;
        padding: 14px;
      }

      .u-card-product h2 {
        margin: 0 0 8px;
        font-size: 17px;
      }

      .u-card-product p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .empty-state {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="u-apply-app">
      <header class="u-apply-header">
        <a class="back-link" href="/games.html" aria-label="返回游戏与工具" title="返回游戏与工具">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </a>
        <div class="u-apply-title">
          <h1>U 卡申请</h1>
          <p>Nexa 登录后申请和查看你的 U 卡</p>
        </div>
        <button class="login-button" type="button">Nexa 登录</button>
      </header>

      <nav class="tab-bar" aria-label="U 卡申请视图">
        <button class="tab-button active" type="button" data-tab="all">所有卡</button>
        <button class="tab-button" type="button" data-tab="mine">我的卡</button>
      </nav>

      <section class="panel" data-panel="all">
        <div class="card-list">
          <article class="u-card-product">
            <h2>U 卡产品</h2>
            <p>后台接通上游 API 后，这里会显示可申请的卡产品、费用和币种。</p>
            <button class="primary-button" type="button">申请卡</button>
          </article>
        </div>
      </section>

      <section class="panel hidden" data-panel="mine">
        <p class="empty-state">申请成功后，卡会显示在这里。</p>
      </section>
    </main>

    <script>
      const tabButtons = document.querySelectorAll('.tab-button');
      const panels = document.querySelectorAll('[data-panel]');

      tabButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const tab = button.dataset.tab;
          tabButtons.forEach((item) => item.classList.toggle('active', item === button));
          panels.forEach((panel) => panel.classList.toggle('hidden', panel.dataset.panel !== tab));
        });
      });
    </script>
  </body>
</html>
