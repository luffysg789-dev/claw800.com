<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>U 卡申请</title>
    <meta name="description" content="Nexa 登录后申请 U 卡，查看所有卡和我的卡。" />
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        --bg: #f5f7f5;
        --surface: #ffffff;
        --ink: #17241b;
        --muted: #637267;
        --line: #dfe7e0;
        --brand: #1f7a4d;
        --brand-soft: #e6f4ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .u-apply-app {
        width: min(430px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px 14px 28px;
      }

      .u-apply-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: #214b31;
        text-decoration: none;
      }

      .back-link svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .u-apply-title {
        flex: 1;
        min-width: 0;
      }

      .u-apply-title h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0;
      }

      .u-apply-title p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .login-button,
      .primary-button {
        min-height: 36px;
        border: 0;
        border-radius: 8px;
        background: var(--brand);
        color: #fff;
        font: inherit;
        font-size: 13px;
        font-weight: 800;
        padding: 0 12px;
      }

      .login-button:disabled,
      .primary-button:disabled {
        opacity: 0.66;
      }

      .session-status {
        margin: -4px 0 14px 48px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .session-status.success {
        color: #16633d;
      }

      .session-status.error {
        color: #a33434;
      }

      .tab-bar {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 14px;
      }

      .tab-button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--muted);
        font: inherit;
        font-weight: 900;
      }

      .tab-button.active {
        border-color: #9bd0ab;
        background: var(--brand-soft);
        color: #14552f;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 14px;
      }

      .card-list {
        display: grid;
        gap: 10px;
      }

      .u-card-product {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfb;
        padding: 14px;
      }

      .u-card-product h2 {
        margin: 0 0 8px;
        font-size: 17px;
      }

      .u-card-product__meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 0 0 12px;
      }

      .u-card-product__meta span {
        border: 1px solid #d7e8dc;
        border-radius: 999px;
        background: #eef8f2;
        color: #23563a;
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
        padding: 6px 8px;
      }

      .u-card-product p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .empty-state {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .list-status {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .list-status.error {
        color: #a33434;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="u-apply-app">
      <header class="u-apply-header">
        <a class="back-link" href="/games.html" aria-label="返回游戏与工具" title="返回游戏与工具">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </a>
        <div class="u-apply-title">
          <h1>U 卡申请</h1>
          <p>Nexa 登录后申请和查看你的 U 卡</p>
        </div>
        <button id="uCardLoginBtn" class="login-button" type="button">Nexa 登录</button>
      </header>

      <p id="uCardSessionStatus" class="session-status" aria-live="polite"></p>

      <nav class="tab-bar" aria-label="U 卡申请视图">
        <button class="tab-button active" type="button" data-tab="all">所有卡</button>
        <button class="tab-button" type="button" data-tab="mine">我的卡</button>
      </nav>

      <section class="panel" data-panel="all">
        <p id="uCardAllStatus" class="list-status">正在加载 U 卡产品...</p>
        <div id="uCardAllList" class="card-list"></div>
      </section>

      <section class="panel hidden" data-panel="mine">
        <p class="empty-state">申请成功后，卡会显示在这里。</p>
      </section>
    </main>

    <script>
      const NEXA_PROTOCOL_AUTH_BASE = 'nexaauth://oauth/authorize';
      const NEXA_PUBLIC_CONFIG_ENDPOINT = '/api/nexa/public-config';
      const U_CARD_PRODUCTS_ENDPOINT = '/api/u-card/products';
      const U_CARD_SESSION_STORAGE_KEY = 'claw800:u-card:nexa-session';

      const tabButtons = document.querySelectorAll('.tab-button');
      const panels = document.querySelectorAll('[data-panel]');
      const loginButton = document.getElementById('uCardLoginBtn');
      const sessionStatus = document.getElementById('uCardSessionStatus');
      const allCardsStatus = document.getElementById('uCardAllStatus');
      const allCardsList = document.getElementById('uCardAllList');
      let cachedNexaPublicConfig = null;

      tabButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const tab = button.dataset.tab;
          tabButtons.forEach((item) => item.classList.toggle('active', item === button));
          panels.forEach((panel) => panel.classList.toggle('hidden', panel.dataset.panel !== tab));
        });
      });

      function setSessionStatus(message, tone = '') {
        sessionStatus.textContent = message || '';
        sessionStatus.classList.toggle('success', tone === 'success');
        sessionStatus.classList.toggle('error', tone === 'error');
      }

      function setAllCardsStatus(message, tone = '') {
        allCardsStatus.textContent = message || '';
        allCardsStatus.classList.toggle('error', tone === 'error');
        allCardsStatus.classList.toggle('hidden', !message);
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderUCardProducts(products = []) {
        if (!products.length) {
          allCardsList.innerHTML = '';
          setAllCardsStatus('暂无可申请的 U 卡产品。');
          return;
        }

        setAllCardsStatus('');
        allCardsList.innerHTML = products
          .map((product) => {
            const fee = String(product.fee_amount || '').trim();
            const currency = String(product.currency || '').trim();
            const cardCurrency = String(product.card_currency || '').trim();
            const description = String(product.description || '').trim();
            return `
              <article class="u-card-product" data-product-code="${escapeHtml(product.product_code || product.id || '')}">
                <h2>${escapeHtml(product.name || 'U 卡产品')}</h2>
                <div class="u-card-product__meta">
                  ${fee ? `<span>费用 ${escapeHtml(fee)}${currency ? ` ${escapeHtml(currency)}` : ''}</span>` : ''}
                  ${cardCurrency ? `<span>币种 ${escapeHtml(cardCurrency)}</span>` : ''}
                </div>
                ${description ? `<p>${escapeHtml(description)}</p>` : ''}
                <button class="primary-button" type="button" data-apply-product="${escapeHtml(product.product_code || product.id || '')}">申请卡</button>
              </article>
            `;
          })
          .join('');
      }

      async function loadUCardProducts() {
        setAllCardsStatus('正在加载 U 卡产品...');
        try {
          const response = await fetch(U_CARD_PRODUCTS_ENDPOINT, {
            method: 'GET',
            cache: 'no-store',
            credentials: 'same-origin',
            headers: {
              Accept: 'application/json',
              'Cache-Control': 'no-store',
              Pragma: 'no-cache'
            }
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || payload?.ok === false) {
            throw new Error(payload?.error || 'U 卡产品加载失败');
          }
          renderUCardProducts(Array.isArray(payload.items) ? payload.items : []);
        } catch (error) {
          allCardsList.innerHTML = '';
          setAllCardsStatus(error?.message || 'U 卡产品加载失败', 'error');
        }
      }

      async function getNexaPublicConfig() {
        if (cachedNexaPublicConfig?.apiKey) {
          return cachedNexaPublicConfig;
        }

        const response = await fetch(NEXA_PUBLIC_CONFIG_ENDPOINT, {
          method: 'GET',
          cache: 'no-store',
          credentials: 'same-origin',
          headers: {
            Accept: 'application/json',
            'Cache-Control': 'no-store',
            Pragma: 'no-cache'
          }
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload?.ok === false) {
          throw new Error(payload?.error || 'Nexa 登录配置不可用');
        }

        const apiKey = String(payload?.apiKey || '').trim();
        if (!apiKey) {
          throw new Error('后台未配置 Nexa API Key');
        }

        cachedNexaPublicConfig = { apiKey };
        return cachedNexaPublicConfig;
      }

      function buildCleanReturnUrl() {
        const url = new URL(window.location.href);
        ['code', 'authCode', 'auth_code', 'state'].forEach((key) => url.searchParams.delete(key));
        url.hash = '';
        return url.toString();
      }

      function extractAuthCodeFromUrl() {
        try {
          const params = new URL(window.location.href).searchParams;
          return String(params.get('code') || params.get('authCode') || params.get('auth_code') || '').trim();
        } catch (error) {
          return '';
        }
      }

      function clearAuthCodeFromUrl() {
        try {
          const url = new URL(window.location.href);
          ['code', 'authCode', 'auth_code', 'state'].forEach((key) => url.searchParams.delete(key));
          url.hash = '';
          window.history.replaceState({}, document.title, url.toString());
        } catch (error) {
          // The login flow can continue even if the browser blocks history updates.
        }
      }

      function rememberNexaSession(session) {
        localStorage.setItem(
          U_CARD_SESSION_STORAGE_KEY,
          JSON.stringify({
            ...session,
            savedAt: Date.now()
          })
        );
      }

      function readCachedNexaSession() {
        try {
          const session = JSON.parse(localStorage.getItem(U_CARD_SESSION_STORAGE_KEY) || 'null');
          if (session?.openId && session?.sessionKey) {
            return session;
          }
        } catch (error) {
          localStorage.removeItem(U_CARD_SESSION_STORAGE_KEY);
        }
        return null;
      }

      function showLoggedInState(session) {
        loginButton.textContent = '已登录';
        const name = String(session?.nickname || 'Nexa 用户').trim() || 'Nexa 用户';
        setSessionStatus(`${name}，可以申请 U 卡。`, 'success');
      }

      async function beginNexaLoginFlow() {
        loginButton.disabled = true;
        setSessionStatus('正在打开 Nexa 授权...');
        try {
          const config = await getNexaPublicConfig();
          const redirectUri = buildCleanReturnUrl();
          window.location.href = `${NEXA_PROTOCOL_AUTH_BASE}?apikey=${encodeURIComponent(config.apiKey)}&redirect_uri=${encodeURIComponent(redirectUri)}`;
        } catch (error) {
          loginButton.disabled = false;
          setSessionStatus(error?.message || 'Nexa 登录失败', 'error');
        }
      }

      async function syncSessionFromAuthCode() {
        const authCode = extractAuthCodeFromUrl();
        if (!authCode) {
          const session = readCachedNexaSession();
          if (session) {
            showLoggedInState(session);
          }
          return;
        }

        loginButton.disabled = true;
        setSessionStatus('正在完成 Nexa 登录...');
        try {
          const response = await fetch('/api/nexa/tip/session', {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              authCode,
              gameSlug: 'u-card'
            })
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || payload?.ok === false) {
            throw new Error(payload?.error || 'Nexa 登录失败');
          }

          const source = payload?.session || payload?.data || {};
          const session = {
            openId: String(source.openId || source.open_id || '').trim(),
            sessionKey: String(source.sessionKey || source.session_key || '').trim(),
            nickname: String(source.nickname || source.nickName || 'Nexa 用户').trim() || 'Nexa 用户',
            avatar: String(source.avatar || source.avatarUrl || '').trim()
          };
          if (!session.openId || !session.sessionKey) {
            throw new Error('Nexa 登录信息不完整');
          }

          rememberNexaSession(session);
          showLoggedInState(session);
          clearAuthCodeFromUrl();
        } catch (error) {
          clearAuthCodeFromUrl();
          setSessionStatus(error?.message || 'Nexa 登录失败', 'error');
        } finally {
          loginButton.disabled = false;
        }
      }

      loginButton.addEventListener('click', beginNexaLoginFlow);
      allCardsList.addEventListener('click', (event) => {
        const button = event.target.closest('[data-apply-product]');
        if (!button) return;
        const session = readCachedNexaSession();
        if (!session) {
          beginNexaLoginFlow();
          return;
        }
        setSessionStatus('申请卡接口下一步接入，当前已选产品。', 'success');
      });
      loadUCardProducts();
      syncSessionFromAuthCode();
    </script>
  </body>
</html>
