<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>合作伙伴 - claw800.com</title>
    <link rel="stylesheet" href="/styles.css?v=20260507-03" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <div class="hero-top">
          <h1>
            <a class="hero-logo" href="/">
              <span>claw800.com</span>
            </a>
          </h1>
        </div>
        <div class="hero-subrow">
          <p>龙虾学习导航网，为你的龙虾赋能。</p>
          <div class="lang-switch">
            <a id="homeNavBtn" class="hero-nav-btn" href="/">首页</a>
            <a id="skillsNavBtn" class="hero-nav-btn" href="/skills.html">技能</a>
            <a id="gamesNavBtn" class="hero-nav-btn" href="/games.html">游戏与工具</a>
            <a id="partnersNavBtn" class="hero-nav-btn active" href="/partners.html">伙伴</a>
            <button id="openSubmitFormBtn" class="hero-nav-btn" type="button">提交</button>
            <a
              id="githubStarBtn"
              class="hero-nav-btn hero-nav-btn--icon"
              href="https://github.com/luffysg789-dev/claw800.com"
              target="_blank"
              rel="noopener"
              aria-label="GitHub 加星"
              title="GitHub 加星"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path
                  fill="currentColor"
                  d="M12 .5C5.65.5.5 5.65.5 12A11.5 11.5 0 008.36 22.9c.58.1.79-.25.79-.56v-2.15c-3.2.69-3.87-1.54-3.87-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.05-.71.08-.7.08-.7 1.16.08 1.78 1.2 1.78 1.2 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.28 1.19-3.08-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.17 1.18a11 11 0 015.78 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.8 1.19 1.83 1.19 3.08 0 4.41-2.69 5.39-5.26 5.67.41.36.78 1.08.78 2.18v3.23c0 .31.21.67.8.56A11.5 11.5 0 0023.5 12C23.5 5.65 18.35.5 12 .5z"
                />
              </svg>
            </a>
            <div class="lang-menu" id="langMenu" data-no-translate="true">
              <button id="langMenuBtn" type="button" class="lang-menu-btn" aria-haspopup="menu" aria-expanded="false" title="Language">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
                  <path
                    fill="currentColor"
                    d="M12 2a10 10 0 100 20 10 10 0 000-20Zm7.4 9h-3.1a15.6 15.6 0 00-1.2-5.2A8.02 8.02 0 0119.4 11ZM12 4c.8 0 2.1 1.7 2.9 7H9.1C9.9 5.7 11.2 4 12 4ZM4.6 13h3.1c.2 1.9.7 3.8 1.2 5.2A8.02 8.02 0 014.6 13Zm0-2a8.02 8.02 0 014.3-5.2A15.6 15.6 0 007.7 11H4.6ZM12 20c-.8 0-2.1-1.7-2.9-7h5.8c-.8 5.3-2.1 7-2.9 7Zm3.1-1.8c.5-1.4 1-3.3 1.2-5.2h3.1a8.02 8.02 0 01-4.3 5.2Z"
                  />
                </svg>
              </button>
              <div id="langMenuPopup" class="lang-menu-popup hidden" role="menu">
                <button type="button" class="lang-option" data-lang="en" role="menuitem">English</button>
                <button type="button" class="lang-option" data-lang="zh" role="menuitem">中文</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="games-page">
      <section class="container">
        <section id="partnersList" class="games-grid" data-api="/api/partners" aria-live="polite">
          <article class="game-card">
            <div class="game-card__body">
              <h3>LUCKY STAR INVESTMENT L.L.C</h3>
              <p>迪拜注册投资公司，连接产业、资本与跨境合作机会。</p>
            </div>
            <div class="game-card__actions">
              <a class="game-card__play" href="/lucky-star/" target="_blank" rel="noopener">查看官网</a>
            </div>
          </article>
          <article class="game-card">
            <div class="game-card__body">
              <h3>Panda Dog Thailand</h3>
              <p>泰国 Live Commerce、创意制作、KOL 管理与线下活动执行合作伙伴。</p>
            </div>
            <div class="game-card__actions">
              <a class="game-card__play" href="/panda-dog-thailand/" target="_blank" rel="noopener">查看官网</a>
            </div>
          </article>
        </section>
      </section>
    </main>

    <div id="submitModal" class="submit-modal hidden">
      <div class="submit-modal-mask" id="submitModalMask"></div>
      <div class="submit-modal-card card" role="dialog" aria-modal="true" aria-labelledby="submitTitle">
        <div class="submit-modal-head">
          <h2 id="submitTitle">免费提交网站</h2>
          <button id="closeSubmitModalBtn" type="button" class="submit-close-btn">关闭</button>
        </div>
        <p id="submitDesc">提交后进入审核，管理员通过后展示在首页。</p>
        <form id="submitForm">
          <label id="labelName">网站名称<input name="name" required /></label>
          <label id="labelUrl">网站地址<input name="url" type="url" required placeholder="https://" /></label>
          <label id="labelDesc">一句话简介<textarea name="description" rows="3"></textarea></label>
          <label id="labelMainCategory">内容分类<select id="submitMainCategorySelect" name="contentType"></select></label>
          <label id="labelCategory">分类<select id="categorySelect" name="category"></select></label>
          <label id="labelSubmitter">提交人<input name="submitterName" /></label>
          <label id="labelEmail">邮箱<input name="submitterEmail" type="email" /></label>
          <button id="submitBtn" type="submit">提交审核</button>
        </form>
        <p id="submitMessage" class="message"></p>
      </div>
    </div>

    <script src="/partners.js?v=20260507-05"></script>
    <script src="/submit-modal.js?v=20260315-03"></script>
    <script src="/menu-i18n.js?v=20260507-01"></script>
  </body>
</html>
